scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'shortcut-app'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: 
          - 'host.docker.internal:2112'
    relabel_configs:
      - target_label: service
        replacement: shortcut
      - target_label: environment
        replacement: development