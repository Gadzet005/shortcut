host: localhost:8082
endpoints:
    get_users:
        path: shortcut/get-users
        timeout_ms: 1000
        result_ids:
            - get_users_result
    post_users:
        path: shortcut/post-users
        result_ids:
            - error
    map_users_orders:
        path: shortcut/map
        timeout_ms: 10000
        results_num: 2
        result_ids:
            - default
            - users_without_orders
