apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: trace_id
          matcherRegex: "traceID=(\\w+)"
          url: 'http://jaeger:16686/trace/$${__value.raw}'
    isDefault: false
    editable: true