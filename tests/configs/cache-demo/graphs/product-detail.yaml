nodes:
  fetch-product:
    endpoint-id: catalog/fetch-product
    cache:
      enabled: true
      ttl-ms: 60000
    dependencies:
      - node-id: input
        item-id: http_request
        overriden-item-id: request

  fetch-inventory:
    endpoint-id: catalog/fetch-inventory
    cache:
      enabled: true
      ttl-ms: 60000
    dependencies:
      - node-id: fetch-product
        item-id: product_id

  fetch-pricing:
    endpoint-id: catalog/fetch-pricing
    dependencies:
      - node-id: fetch-product
        item-id: product_id

  build-detail:
    endpoint-id: catalog/build-detail
    dependencies:
      - node-id: fetch-product
        item-id: product
      - node-id: fetch-inventory
        item-id: inventory
      - node-id: fetch-pricing
        item-id: pricing

output-node: build-detail
failure-strategy: ignore
