services:
  mongo:
    image: mongo:8
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  mock-service:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9001/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  shortcut:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
      mock-service:
        condition: service_healthy

volumes:
  mongo-data:
